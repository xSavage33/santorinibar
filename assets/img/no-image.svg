<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8960c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGrad)"/>

  <!-- Decorative border -->
  <rect x="8" y="8" width="184" height="184" rx="4" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.3"/>

  <!-- Wine bottle icon -->
  <g transform="translate(100,100)" fill="url(#iconGrad)">
    <!-- Bottle body -->
    <path d="M-12 45 L-12 10 Q-12 -5 -8 -15 L-8 -35 Q-8 -40 -6 -40 L6 -40 Q8 -40 8 -35 L8 -15 Q12 -5 12 10 L12 45 Q12 50 8 50 L-8 50 Q-12 50 -12 45 Z" opacity="0.9"/>
    <!-- Bottle neck ring -->
    <rect x="-6" y="-42" width="12" height="4" rx="1" opacity="0.7"/>
    <!-- Label -->
    <rect x="-8" y="5" width="16" height="20" rx="2" fill="#1a1a2e" opacity="0.5"/>
  </g>

  <!-- Decorative corners -->
  <path d="M15 15 L35 15 M15 15 L15 35" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
  <path d="M185 15 L165 15 M185 15 L185 35" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
  <path d="M15 185 L35 185 M15 185 L15 165" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
  <path d="M185 185 L165 185 M185 185 L185 165" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>

  <!-- Text -->
  <text x="100" y="175" text-anchor="middle" fill="#d4af37" font-family="Georgia, serif" font-size="11" opacity="0.6">Sin imagen</text>
</svg>
